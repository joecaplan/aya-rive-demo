<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rive Scroll Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: sans-serif;
    }

    .spacer {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #888;
    }

    .icon-section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    canvas {
      width: 300px;
      height: 300px;
      border-radius: 16px;
      display: block;
    }

    .status {
      font-size: 1rem;
      color: #aaa;
      letter-spacing: 0.05em;
    }

    .status span {
      color: #5bc8f5;
      font-weight: bold;
    }
  </style>
</head>

  <div class="spacer">↓ Scroll down to see the animation ↓</div>

  <section class="icon-section" id="icon-section">
    <canvas id="rive-canvas" width="300" height="300"></canvas>
    <p class="status">State: <span id="state-label">Loading…</span></p>
  </section>

  <div class="spacer">↑ Scroll back up ↑</div>

    function base64ToBuffer(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes.buffer;
    }

    const label = document.getElementById('state-label');
    let riveInstance;

    riveInstance = new rive.Rive({
      buffer: base64ToBuffer(RIV_BASE64),
      canvas: document.getElementById('rive-canvas'),
      stateMachines: 'State Machine 1',
      autoplay: true,

      onLoad() {
        riveInstance.resizeDrawingSurfaceToCanvas();
        const inputs = riveInstance.stateMachineInputs('State Machine 1');
        console.log('[Rive] Loaded. Inputs:', inputs?.map(i => i.name));
        label.textContent = 'Ready — scroll to trigger';
        setupObserver();
      },

      onLoadError(err) {
        console.error('[Rive] Load error:', err);
        label.textContent = 'Load error — check console';
      }
    });

    function getInput(name) {
      return riveInstance
        ?.stateMachineInputs('State Machine 1')
        ?.find(i => i.name === name);
    }

    function setupObserver() {
      const section = document.getElementById('icon-section');
      let currentStage = 0; // 0=initial, 1=stage1, 2=stage2

      function checkPosition() {
        const rect = section.getBoundingClientRect();
        const vh = window.innerHeight;
        const centerPct = (rect.top + rect.height / 2) / vh;

        if (centerPct > 0.2 && centerPct < 0.8) {
          // Icon center in middle 60% → animate in
          if (currentStage !== 2) {
            currentStage = 2;
            getInput('Trigger_Stage2')?.fire();
            label.textContent = 'On Screen → Stage 2 (Final)';
          }
        } else if (currentStage === 2) {
          // Icon center in top/bottom 20% → animate back
          currentStage = 1;
          getInput('Trigger_Stage1')?.fire();
          label.textContent = 'Leaving → Stage 1 (Start)';
        }
      }

      window.addEventListener('scroll', checkPosition, { passive: true });
    }
  </script>
